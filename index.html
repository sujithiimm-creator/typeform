<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EngageForm | Vercel Ready</title>
    <meta name="description" content="A highly engaging, minimal form experience powered by Vercel.">
    <!-- Google Fonts for premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Form View -->
    <main id="app">
        <!-- Progress Bar -->
        <div class="progress-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>

        <!-- Question Container -->
        <div id="question-container" class="question-container">
            <!-- Content gets injected here -->
        </div>

        <!-- Navigation Helpers -->
        <div class="nav-helpers fade-in">
            <span class="nav-hint">Press <strong>Enter ↵</strong></span>
            <div class="nav-buttons">
                <button id="btn-up" class="nav-btn" aria-label="Previous question">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="18 15 12 9 6 15"></polyline>
                    </svg>
                </button>
                <button id="btn-down" class="nav-btn" aria-label="Next question">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="6 9 12 15 18 9"></polyline>
                    </svg>
                </button>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>

</html>
